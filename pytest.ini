[pytest]
# pytest configuration for The Singularity game testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    ai: marks tests that use AI players (deselect with '-m "not ai"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    regression: marks regression tests for known bugs
    integration: marks integration tests that require external services

# Asyncio configuration for AI tests
asyncio_mode = auto

# Console output verbosity
console_output_style = progress
addopts =
    --tb=short
    --disable-warnings

# Test paths
testpaths = backend/tests

# Coverage options (when using --cov)
[coverage:run]
source = backend
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
