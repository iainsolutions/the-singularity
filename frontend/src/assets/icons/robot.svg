<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Robot head automation">
  <!-- Main head - square -->
  <rect x="18" y="20" width="28" height="32" rx="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Face plate divider -->
  <line x1="18" y1="32" x2="46" y2="32" stroke="#1B2A4A" stroke-width="2" fill="none"/>

  <!-- Left eye -->
  <circle cx="26" cy="26" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Right eye -->
  <circle cx="38" cy="26" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Mouth/speaker grille -->
  <line x1="26" y1="40" x2="38" y2="40" stroke="#1B2A4A" stroke-width="2" fill="none"/>
  <line x1="26" y1="44" x2="38" y2="44" stroke="#1B2A4A" stroke-width="2" fill="none"/>

  <!-- Left antenna -->
  <line x1="24" y1="20" x2="22" y2="8" stroke="#1B2A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="22" cy="8" r="2.5" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Right antenna -->
  <line x1="40" y1="20" x2="42" y2="8" stroke="#1B2A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="8" r="2.5" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Chin/jaw -->
  <line x1="20" y1="52" x2="44" y2="52" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>
</svg>
