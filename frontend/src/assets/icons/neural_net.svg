<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Neural network nodes">
  <!-- Left layer nodes -->
  <circle cx="12" cy="22" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>
  <circle cx="12" cy="42" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Middle layer nodes -->
  <circle cx="32" cy="16" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="48" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Right layer nodes -->
  <circle cx="52" cy="22" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>
  <circle cx="52" cy="42" r="3" stroke="#1B2A4A" stroke-width="2.5" fill="none"/>

  <!-- Connections from left to middle -->
  <line x1="15" y1="22" x2="29" y2="16" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="15" y1="22" x2="29" y2="32" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="15" y1="22" x2="29" y2="48" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>

  <line x1="15" y1="42" x2="29" y2="16" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="15" y1="42" x2="29" y2="32" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="15" y1="42" x2="29" y2="48" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>

  <!-- Connections from middle to right -->
  <line x1="35" y1="16" x2="49" y2="22" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="16" x2="49" y2="42" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>

  <line x1="35" y1="32" x2="49" y2="22" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="32" x2="49" y2="42" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>

  <line x1="35" y1="48" x2="49" y2="22" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="48" x2="49" y2="42" stroke="#1B2A4A" stroke-width="1.5" fill="none"/>
</svg>
